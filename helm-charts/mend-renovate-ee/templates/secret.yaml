{{- $root := . -}}
{{- $baseWorker := mustDeepCopy (omit $root.Values.renovateWorker "pools") -}}
{{- $workerPools := default (list) $root.Values.renovateWorker.pools -}}

{{- $hasPools := gt (len $workerPools) 0 -}}

{{- if not $hasPools -}}
  {{- $workerPools = list (dict "name" "") -}}
{{- end -}}

{{- if and $root.Values.renovateWorker.npmrc (not $root.Values.renovateWorker.npmrcExistingSecret) }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "mend-renovate.npmrc-secret-name" $root }}
  namespace: {{ $root.Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ $root.Release.Name }}
    helm.sh/chart: {{ include "mend-renovate.chart" $root }}
    app.kubernetes.io/instance: {{ $root.Release.Name }}
    app.kubernetes.io/managed-by: {{ $root.Release.Service }}
data:
  .npmrc: {{ $root.Values.renovateWorker.npmrc | b64enc | quote }}
{{- end }}

---

{{- if not .Values.license.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  namespace: {{ .Release.Namespace }}
  name: {{ include "mend-renovate.license-secret-name" . }}
  labels:
    app.kubernetes.io/name: {{ .Release.Name }}
    helm.sh/chart: {{ include "mend-renovate.chart" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
data:
  {{- if .Values.license.mendRnvLicenseKey }}
  mendRnvLicenseKey: {{ .Values.license.mendRnvLicenseKey | b64enc | quote }}
  {{- end}}
{{- end}}

---

{{- if not .Values.renovateServer.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  namespace: {{ .Release.Namespace }}
  name: {{ include "mend-renovate.server-secret-name" . }}
  labels:
    app.kubernetes.io/name: {{ .Release.Name }}
    helm.sh/chart: {{ include "mend-renovate.chart" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
data:
  {{- if .Values.renovateServer.mendRnvGitlabPat }}
  mendRnvGitlabPat: {{ .Values.renovateServer.mendRnvGitlabPat | b64enc | quote }}
  {{- end}}
  {{- if .Values.renovateServer.mendRnvGithubAppId }}
  mendRnvGithubAppId: {{ .Values.renovateServer.mendRnvGithubAppId | b64enc | quote }}
  {{- end}}
  {{- if .Values.renovateServer.mendRnvGithubAppKey }}
  mendRnvGithubAppKey: {{ .Values.renovateServer.mendRnvGithubAppKey | b64enc | quote }}
  {{- end}}
  {{- if .Values.renovateServer.mendRnvBitbucketPat }}
  mendRnvBitbucketPat: {{ .Values.renovateServer.mendRnvBitbucketPat | b64enc | quote }}
  {{- end}}
  {{- if .Values.renovateServer.mendRnvAdminToken }}
  mendRnvAdminToken: {{ .Values.renovateServer.mendRnvAdminToken | b64enc | quote }}
  {{- end}}
  {{- if .Values.renovateServer.mendRnvWebhookSecret }}
  mendRnvWebhookSecret: {{ .Values.renovateServer.mendRnvWebhookSecret | b64enc | quote }}
  {{- end}}
  {{- if .Values.renovateServer.mendRnvServerApiSecret }}
  mendRnvServerApiSecret: {{ .Values.renovateServer.mendRnvServerApiSecret | b64enc | quote }}
  {{- end }}
  {{- if .Values.postgresql.password }}
  pgPassword: {{ .Values.postgresql.password | b64enc | quote }}
  {{- end }}
{{- end }}

---

{{- if and .Values.renovateWeb.enabled (not .Values.renovateWeb.existingSecret) (or .Values.renovateWeb.mendRnvGithubClientSecret .Values.renovateWeb.mendRnvBackendSecret) }}
apiVersion: v1
kind: Secret
metadata:
  namespace: {{ .Release.Namespace }}
  name: {{ include "mend-renovate.web-secret-name" . }}
  labels:
    app.kubernetes.io/name: {{ .Release.Name }}
    helm.sh/chart: {{ include "mend-renovate.chart" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
data:
  {{- if .Values.renovateWeb.mendRnvBackendSecret }}
  mendRnvBackendSecret: {{ .Values.renovateWeb.mendRnvBackendSecret | b64enc | quote }}
  {{- end }}
  {{- if .Values.renovateWeb.mendRnvGithubClientSecret }}
  mendRnvGithubClientSecret: {{ .Values.renovateWeb.mendRnvGithubClientSecret | b64enc | quote }}
  {{- end }}
{{- end }}

{{- range $pool := $workerPools }}
{{- $renovateWorker := mustMergeOverwrite (mustDeepCopy $baseWorker) (mustDeepCopy $pool) }}
{{- if not $renovateWorker.existingSecret }}
---
apiVersion: v1
kind: Secret
metadata:
  namespace: {{ $root.Release.Namespace }}
  name: {{ include "mend-renovate.worker-secret-name-for-pool" (dict "root" $root "worker" $renovateWorker) }}
  labels:
    app.kubernetes.io/name: {{ $root.Release.Name }}
    helm.sh/chart: {{ include "mend-renovate.chart" $root }}
    app.kubernetes.io/instance: {{ $root.Release.Name }}
    app.kubernetes.io/managed-by: {{ $root.Release.Service }}
data:
  {{- if $renovateWorker.githubComToken }}
  githubComToken: {{ $renovateWorker.githubComToken | b64enc | quote }}
  {{- end}}
  {{- if $renovateWorker.pipIndexUrl }}
  pipIndexUrl: {{ $renovateWorker.pipIndexUrl | b64enc | quote }}
  {{- end}}
{{- end }}
{{- end }}
