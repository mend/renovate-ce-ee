{{- $root := . -}}
{{- $base := mustDeepCopy (omit $root.Values.renovateWorker "pools") -}}
{{- $workerPools := default (list) $root.Values.renovateWorker.pools -}}

{{- $hasPools := gt (len $workerPools) 0 -}}

{{- include "mend-renovate.validate-worker-pools" $root -}}

{{- if not $hasPools -}}
  {{- $workerPools = list (dict "name" "") -}}
{{- end -}}

{{- range $pool := $workerPools }}

{{- $renovateWorker := mustMergeOverwrite (mustDeepCopy $base) (mustDeepCopy $pool) }}

{{- $poolName := "" -}}
{{- if $hasPools -}}
  {{- $poolName = required "renovateWorker.pools[].name is required when pools are configured" $renovateWorker.name -}}
{{- end -}}

{{- $poolExtraConfigMaps := list -}}
{{- if and (kindIs "map" $pool) (hasKey $pool "extraConfigMaps") -}}
  {{- $poolExtraConfigMaps = default (list) $pool.extraConfigMaps -}}
{{- end -}}

{{- $createDeployment := true -}}
{{- if and (kindIs "map" $pool) (hasKey $pool "createDeployment") -}}
  {{- $createDeployment = $pool.createDeployment -}}
{{- end -}}

{{- if $createDeployment }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "mend-renovate.fullname" $root }}-worker{{ if $renovateWorker.name }}-{{ $renovateWorker.name }}{{ end }}
  namespace: {{ $root.Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ include "mend-renovate.name" $root }}
    helm.sh/chart: {{ include "mend-renovate.chart" $root }}
    app.kubernetes.io/instance: {{ $root.Release.Name }}
    app.kubernetes.io/managed-by: {{ $root.Release.Service }}
    {{- if $hasPools }}
    renovate-worker-pool: {{ $poolName | quote }}
    {{- end }}
    {{- with $renovateWorker.labels.deployment }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  replicas: {{ $renovateWorker.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "mend-renovate.name" $root }}
      app.kubernetes.io/instance: {{ $root.Release.Name }}
      app: {{ include "mend-renovate.name" $root }}-worker
      {{- if $hasPools }}
      renovate-worker-pool: {{ $poolName | quote }}
      {{- end }}
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "mend-renovate.name" $root }}
        app.kubernetes.io/instance: {{ $root.Release.Name }}
        app: {{ include "mend-renovate.name" $root }}-worker
        {{- if $hasPools }}
        renovate-worker-pool: {{ $poolName | quote }}
        {{- end }}
        {{- with $renovateWorker.labels.pods }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        checksum/config.jsFileConfigMap: {{ $renovateWorker.config | sha256sum }}
        checksum/shardedExtraConfigMaps: {{ include (print $root.Template.BasePath "/extra-configmaps.yaml") $root | sha256sum }}
        checksum/extraConfigMapsGlobal: {{ $root.Values.renovateWorker.extraConfigMaps | toYaml | sha256sum }}
        checksum/extraConfigMapsPool: {{ $poolExtraConfigMaps | toYaml | sha256sum }}
        {{- with $renovateWorker.annotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
{{ include "mend-renovate.worker-pod-spec" (dict "root" $root "worker" $renovateWorker) | nindent 6 }}
{{- end }}
{{ end }}
